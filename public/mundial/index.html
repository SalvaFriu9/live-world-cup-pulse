<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mundial 2026 EN VIVO · Marcadores, Posiciones y Estadísticas</title>
<meta name="description" content="Sigue en vivo la Copa Mundial FIFA 2026: marcadores en directo, goles, posiciones por grupo, estadísticas, goleadores y próximos partidos." />
<link rel="preconnect" href="https://flagcdn.com" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- HEADER -->
  <header class="topbar">
    <div class="brand">
      <div class="logo">🏆</div>
      <div>
        <h1>Mundial 2026 <span class="live-tag"><span class="dot"></span>EN VIVO</span></h1>
        <p class="sub">Copa Mundial FIFA · USA · México · Canadá</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="clock" id="clock">--:--:--</div>
      <button id="soundToggle" class="icon-btn" title="Sonido de gol">🔔</button>
      <button id="refreshBtn" class="icon-btn primary" title="Actualizar ahora">⟳ Actualizar</button>
    </div>
  </header>

  <!-- DASHBOARD -->
  <section class="dashboard" aria-label="Resumen">
    <div class="stat-card">
      <div class="stat-label">En vivo</div>
      <div class="stat-value" id="stat-live">0</div>
      <div class="stat-foot"><span class="live-dot"></span>partidos ahora</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Goles hoy</div>
      <div class="stat-value" id="stat-goals">0</div>
      <div class="stat-foot">⚽ anotados</div>
    </div>
    <div class="stat-card highlight">
      <div class="stat-label">Próximo partido</div>
      <div class="stat-value small" id="stat-next">—</div>
      <div class="stat-foot" id="stat-next-time">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total partidos</div>
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-foot">torneo completo</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Equipos</div>
      <div class="stat-value" id="stat-teams">48</div>
      <div class="stat-foot">selecciones</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Última actualización</div>
      <div class="stat-value small" id="stat-updated">—</div>
      <div class="stat-foot">auto cada 30s</div>
    </div>
  </section>

  <!-- TABS -->
  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="matches">Partidos</button>
    <button class="tab" data-tab="standings">Posiciones</button>
    <button class="tab" data-tab="scorers">Goleadores</button>
    <button class="tab" data-tab="upcoming">Próximos</button>
    <button class="tab" data-tab="results">Resultados</button>
  </nav>

  <main class="content">
    <!-- MATCHES -->
    <section class="tab-panel active" id="panel-matches">
      <div class="filters">
        <input type="text" id="f-team" placeholder="Buscar selección…" />
        <select id="f-group"><option value="">Todos los grupos</option></select>
        <select id="f-status">
          <option value="">Todos los estados</option>
          <option value="LIVE">En vivo</option>
          <option value="NS">Programados</option>
          <option value="FT">Finalizados</option>
        </select>
        <input type="date" id="f-date" />
        <button id="f-clear" class="ghost">Limpiar</button>
      </div>
      <div id="matches" class="match-grid"></div>
    </section>

    <!-- STANDINGS -->
    <section class="tab-panel" id="panel-standings">
      <div id="standings" class="standings-grid"></div>
    </section>

    <!-- SCORERS -->
    <section class="tab-panel" id="panel-scorers">
      <div id="scorers" class="scorers-list"></div>
    </section>

    <!-- UPCOMING -->
    <section class="tab-panel" id="panel-upcoming">
      <div id="upcoming" class="match-grid"></div>
    </section>

    <!-- RESULTS -->
    <section class="tab-panel" id="panel-results">
      <div id="results" class="match-grid"></div>
    </section>
  </main>

  <!-- MATCH DETAIL MODAL -->
  <div class="modal" id="modal" hidden>
    <div class="modal-bg" data-close></div>
    <div class="modal-card">
      <button class="modal-close" data-close>✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toasts" class="toasts"></div>

  <audio id="goalSound" src="https://cdn.jsdelivr.net/gh/anars/blank-audio@master/250-milliseconds-of-silence.mp3" preload="auto"></audio>

  <footer class="footer">
    <p>Datos vía API-Football · UI © Mundial 2026 EN VIVO</p>
  </footer>

  <script src="./app.js" defer></script>
</body>
</html>
